# 自动发布工作流：push 形如 v* 的 tag 即触发
# 云端编译 Tauri 2 应用，产出 NSIS(.exe) 安装包并发布到 GitHub Release
# workflow_dispatch 手动触发仅做构建验证（验证缓存命中/编译耗时），不发布 Release。
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动触发：用于验证 CI 改动（如缓存配置），不产生 Release

permissions:
  contents: write # 创建 Release 必需（仅 tag push 时实际用到）

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 编译产物
        # 不传 workspaces：项目 workspace 根在仓库顶层，target 默认就在 <repo>/target。
        # 旧配置 'src-tauri -> target' 误导缓存去 src-tauri/target 找，与实际产物路径不符，
        # 导致连续多次构建均 "No cache found" 全量编译（v0.1.1/v0.1.2 均如此，11-12 分钟）。
        # 固定到具体版本 v2.9.1（非浮动 v2/v3 标签）：v3 曾被上游回收导致 v0.1.3 CI 失败，
        # 固定版本杜绝浮动标签被删再翻车。
        uses: Swatinem/rust-cache@v2.9.1

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 仅 tag push 时才走 Release 流程；手动触发（workflow_dispatch）只构建不打 Release。
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: 'SnapText v__VERSION__'
          releaseBody: '详见 docs/CHANGELOG.md'
          releaseDraft: false
          prerelease: false
