# 自动发布工作流：push 形如 v* 的 tag 即触发
# 云端编译 Tauri 2 应用，产出 NSIS(.exe) 安装包并发布到 GitHub Release
# workflow_dispatch 手动触发仅做构建验证（验证缓存命中/编译耗时），不发布 Release。
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 手动触发：用于验证 CI 改动（如缓存配置），不产生 Release

permissions:
  contents: write # 创建 Release 必需（仅 tag push 时实际用到）

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: 安装前端依赖
        run: npm ci

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 编译产物
        # 不传 workspaces：项目 workspace 根在仓库顶层，target 默认就在 <repo>/target。
        # 旧配置 'src-tauri -> target' 误导缓存去 src-tauri/target 找，与实际产物路径不符，
        # 导致连续多次构建均 "No cache found" 全量编译（v0.1.1/v0.1.2 均如此，11-12 分钟）。
        # 固定到具体版本 v2.9.1（非浮动 v2/v3 标签）：v3 曾被上游回收导致 v0.1.3 CI 失败，
        # 固定版本杜绝浮动标签被删再翻车。
        uses: Swatinem/rust-cache@v2.9.1

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 仅 tag push 时才走 Release 流程；手动触发（workflow_dispatch）只构建不打 Release。
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: 'SnapText v__VERSION__'
          # Release 正文直接内联：GitHub Release 页面不渲染仓库内文件，
          # 写「详见 docs/CHANGELOG.md」下载者看不到。改为内联本次更新内容。
          releaseBody: |
            ## 修复

            - **第二次快捷键框选时结果窗口不刷新**：快捷键截图 → 出结果窗口 → 不关 →
              再按快捷键框选，结果窗口停在第一次的内容不更新。

            **根因**：结果窗口用固定 label `"result"` 重复创建，第二次起 Tauri 发现
            同 label 窗口已存在 → 不重建页面 → `onMounted` 不重跑 → 不重新拉取
            后端已更新的截图/OCR/翻译数据。

            **修复**：改为「存在则复用刷新、不存在才新建」模式 ——
            - 选区窗 crop 后判断结果窗口：存在则发 `result-refresh` 事件唤醒刷新，
              不存在才新建窗口
            - 结果窗口监听该事件，重新拉取裁剪图 → OCR → 翻译，完整重置状态防残留
            - 加 generation 守卫：若旧一轮 OCR/翻译的异步请求在新一轮开始后才完成，
              自动丢弃结果，避免慢的旧请求覆盖快的新请求
            - 图片 URL 加时间戳防缓存，确保底图每次都刷新

            后端零改动。详见 `docs/CHANGELOG.md`。
          releaseDraft: false
          prerelease: false
